<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELIOS — Güneş Rüzgarı İzleme Sistemi</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@200;300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #04040f; --bg2: #080820;
    --border: rgba(100,140,255,0.12); --border2: rgba(100,140,255,0.28);
    --accent: #4a9eff; --accent2: #ff8c42;
    --text: #d0d8f0; --muted: rgba(180,200,255,0.45);
    --ok: #3ddc84;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Exo 2', sans-serif;
    --display: 'Orbitron', sans-serif;
  }

  html, body {
    height: 100%; background: var(--bg);
    color: var(--text); font-family: var(--sans);
    overflow: hidden;
  }

  #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

  /* ══ NAVBAR ══ */
  #navbar {
    height: 56px; min-height: 56px;
    background: rgba(4,4,15,0.98);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 28px; z-index: 100;
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  /* Logo */
  .nav-logo {
    display: flex; align-items: center; gap: 11px;
    cursor: pointer; text-decoration: none;
    flex-shrink: 0; transition: opacity 0.2s;
  }
  .nav-logo:hover { opacity: 0.8; }
  .nav-logo-icon { width: 44px; height: 44px; }
  .nav-logo-name {
    font-family: var(--display); font-size: 15px; font-weight: 700;
    color: #fff; letter-spacing: 0.18em; line-height: 1;
  }
  .nav-logo-sub {
    font-family: var(--mono); font-size: 7px;
    color: var(--muted); letter-spacing: 0.1em; margin-top: 2px;
  }

  .nav-sep { width: 1px; height: 28px; background: var(--border); margin: 0 28px; flex-shrink: 0; }

  /* Nav linkleri */
  .nav-links { display: flex; align-items: center; gap: 2px; margin-left: auto; }

  .nav-link {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    color: var(--muted); text-transform: uppercase;
    padding: 9px 14px; cursor: pointer; border-radius: 3px;
    transition: all 0.22s; text-decoration: none;
    border-bottom: 2px solid transparent; white-space: nowrap;
    background: none; border-top: none; border-left: none; border-right: none;
  }
  .nav-link:hover { color: var(--text); background: rgba(100,140,255,0.06); }
  .nav-link.active { color: #fff; border-bottom-color: var(--accent); }

  /* Sağ taraf */
  .nav-right { display: flex; align-items: center; gap: 10px; margin-left: 20px; flex-shrink: 0; }
  .live-pill {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
    color: var(--ok); background: rgba(61,220,132,0.08);
    border: 1px solid rgba(61,220,132,0.2); border-radius: 3px; padding: 4px 10px;
  }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ok); animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  /* ══ SAYFA ALANI ══ */
  #page-area { flex: 1; position: relative; overflow: hidden; }

  /* GİRİŞ SAYFASI */
  #page-landing {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50; background: var(--bg);
    transition: opacity 0.4s;
  }
  #page-landing.hidden { opacity: 0; pointer-events: none; z-index: -1; }

  .corner { position: absolute; width: 20px; height: 20px; opacity: 0.35; }
  .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

  .landing-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; }

  /* Halka animasyonu */
  .anim-wrap { width: 240px; height: 240px; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 44px; }
  .ring { position: absolute; border-radius: 50%; border: 1px solid; animation: spin linear infinite; }
  .r1 { width: 72px;  height: 72px;  border-color: rgba(255,200,50,0.65);  animation-duration: 5s; }
  .r2 { width: 118px; height: 118px; border-color: rgba(255,140,66,0.38);  animation-duration: 10s; animation-direction: reverse; }
  .r3 { width: 170px; height: 170px; border-color: rgba(74,158,255,0.28);  animation-duration: 17s; }
  .r4 { width: 225px; height: 225px; border-color: rgba(159,122,234,0.18); animation-duration: 26s; animation-direction: reverse; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .ring-dot { position: absolute; width: 7px; height: 7px; border-radius: 50%; top: -3.5px; left: 50%; transform: translateX(-50%); }
  .r1 .ring-dot { background: #ffcc33; box-shadow: 0 0 8px #ffcc33, 0 0 16px rgba(255,200,50,0.5); }
  .r2 .ring-dot { background: #ff8c42; box-shadow: 0 0 8px #ff8c42; }
  .r3 .ring-dot { background: #4a9eff; box-shadow: 0 0 8px #4a9eff; }
  .r4 .ring-dot { background: #9f7aea; box-shadow: 0 0 8px #9f7aea; }
  .center-glow {
    width: 32px; height: 32px; border-radius: 50%; z-index: 2;
    background: radial-gradient(circle at 35% 35%, #fff8e1, #ffcc33 50%, #ff8800);
    box-shadow: 0 0 18px 8px rgba(255,180,0,0.5), 0 0 50px 18px rgba(255,100,0,0.2);
    animation: cpulse 3s ease-in-out infinite;
  }
  @keyframes cpulse {
    0%,100% { transform:scale(1);    box-shadow: 0 0 18px 8px rgba(255,180,0,0.5),  0 0 50px 18px rgba(255,100,0,0.2); }
    50%      { transform:scale(1.12); box-shadow: 0 0 28px 12px rgba(255,180,0,0.65), 0 0 70px 26px rgba(255,100,0,0.3); }
  }

  .landing-tag {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
    color: var(--accent); text-transform: uppercase;
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .landing-tag::before, .landing-tag::after { content: ''; display: block; width: 28px; height: 1px; background: var(--accent); opacity: 0.5; }

  /* SADECE BU CSS EKLENDİ - helios logo resmi */
  .helios-logo-img {
    width: min(850px, 88vw);
    height: clamp(110px, 15vw, 190px);
    object-fit: contain;
    margin-bottom: 0px;
    opacity: 0.92;
  }

  .landing-sub {
    font-family: var(--display); font-size: clamp(10px,1.1vw,13px);
    font-weight: 400; color: var(--muted); letter-spacing: 0.2em;
    text-transform: uppercase; margin-bottom: 50px; margin-top: -10px;
  }

  /* Keşfet butonu */
  .btn-discover {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 42px; background: transparent;
    border: 1px solid rgba(74,158,255,0.45); border-radius: 3px;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em;
    color: var(--accent); cursor: pointer; text-transform: uppercase;
    transition: all 0.35s; position: relative; overflow: hidden;
  }
  .btn-discover::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(74,158,255,0.08), transparent);
    transform: translateX(-100%); transition: transform 0.5s;
  }
  .btn-discover:hover { color: #fff; border-color: var(--accent); box-shadow: 0 0 24px rgba(74,158,255,0.25); }
  .btn-discover:hover::before { transform: translateX(100%); }
  .btn-discover svg { transition: transform 0.3s; }
  .btn-discover:hover svg { transform: translateY(3px); }

  /* Giriş animasyonları */
  .fd { opacity:0; transform:translateY(16px); animation: fadeUp 0.7s ease forwards; }
  .fd1{animation-delay:0.05s} .fd2{animation-delay:0.2s} .fd3{animation-delay:0.35s}
  .fd4{animation-delay:0.5s}  .fd5{animation-delay:0.65s}
  @keyframes fadeUp { to{opacity:1;transform:translateY(0)} }

  /* ══ IFRAME SAYFALAR ══ */
  .iframe-page {
    display: none;
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .iframe-page.active { display: block; }

  /* Yükleniyor göstergesi */
  .page-loader {
    display: none;
    position: absolute; inset: 0;
    background: var(--bg);
    align-items: center; justify-content: center; flex-direction: column; gap: 16px;
    z-index: 10;
  }
  .page-loader.show { display: flex; }
  .loader-text { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .loader-bar-wrap { width: 160px; height: 1px; background: var(--border); }
  .loader-bar { height: 100%; background: var(--accent); animation: loadAnim 1.2s ease-in-out infinite; }
  @keyframes loadAnim { 0%{width:0%} 60%{width:85%} 100%{width:100%} }
</style>
</head>

<script>
let activePage = null;
const loaded = {};

function goToLanding() {
  document.getElementById('page-landing').classList.remove('hidden');
  document.querySelectorAll('.iframe-page').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  document.getElementById('page-loader').classList.remove('show');
  activePage = null;
}

function loadPage(name, file, btn) {
  document.getElementById('page-landing').classList.add('hidden');
  document.querySelectorAll('.iframe-page').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.nav-link')[0].classList.add('active');

  const iframe = document.getElementById('iframe-' + name);

  if (!loaded[name]) {
    document.getElementById('page-loader').classList.add('show');
    document.getElementById('loader-text').textContent = file.replace('.html','').toUpperCase() + ' yükleniyor...';
    iframe.src = file;
    loaded[name] = true;
    iframe.onload = () => document.getElementById('page-loader').classList.remove('show');
    setTimeout(() => document.getElementById('page-loader').classList.remove('show'), 3000);
  }

  iframe.classList.add('active');
  activePage = name;
}
</script>
